# SSL/TLS Configuration for Replication

ssl:
  # Enable TLS for all connections
  enabled: true
  
  # TLS version
  min_version: "1.3"
  
  # Certificate Authority
  ca:
    cert_path: "/etc/ssl/certs/ca.crt"
    key_path: "/etc/ssl/private/ca.key"
    common_name: "CCTV DVR CA"
    validity_days: 3650        # 10 years

  # Server certificate
  server:
    cert_path: "/etc/ssl/certs/server.crt"
    key_path: "/etc/ssl/private/server.key"
    common_name: "spacetimedb.local"
    san_names:
      - "localhost"
      - "127.0.0.1"
      - "spacetimedb.local"
      - "spacetimedb.example.com"
    validity_days: 365

  # Client certificate (mTLS)
  client:
    cert_path: "/etc/ssl/certs/client.crt"
    key_path: "/etc/ssl/private/client.key"
    common_name: "cctv-dvr-client"
    validity_days: 365

  # Backup server certificates
  backup_servers:
    aws_s3:
      verify_hostname: true
      verify_cert: true
    
    azure_blob:
      verify_hostname: true
      verify_cert: true
    
    nfs_server:
      verify_hostname: false    # NFS may not support hostname verification
      verify_cert: false

  # Certificate rotation
  rotation:
    enabled: true
    check_interval_days: 30
    renew_before_days: 30      # Renew 30 days before expiry
    rotation_strategy: "gradual" # gradual or immediate

# Cipher suites for TLS 1.3
cipher_suites:
  - "TLS_AES_256_GCM_SHA384"
  - "TLS_CHACHA20_POLY1305_SHA256"
  - "TLS_AES_128_GCM_SHA256"

# Certificate pinning (optional)
pinning:
  enabled: false
  pins:
    aws_s3:
      - "sha256/AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
    azure_blob:
      - "sha256/BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB="
